[project]
name = "scribeflow-workers"
version = "0.0.0"
description = "Async pipeline workers: slicer, transcriber, diarizer, stitcher, extractor, embedder, ch-ingest"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = ["pytest>=8.3", "ruff>=0.8", "mypy>=1.14"]

[tool.ruff]
line-length = 90
target-version = "py312"

[tool.mypy]
strict = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scribeflow_workers"]
