name: scribeflow

# One-VM layout per docs/infrastructure.md — RAM budget assumes this exact
# set of services on the 12 GB Oracle Always Free instance. Adding a service
# means revisiting that budget table, not just adding it here.

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    # Ticket 3.5 (D63): pgvector's Postgres extension isn't available in the
    # plain postgres image — this is the same postgres:16 build with the
    # extension pre-installed, nothing else different (same data dir, same
    # env vars, same healthcheck).
    image: pgvector/pgvector:pg16
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scribeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scribeflow}
      POSTGRES_DB: ${POSTGRES_DB:-scribeflow}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    ports:
      # Host port 55432, not 5432 — many dev machines (including the one
      # this was built on) already run a local Postgres on 5432.
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scribeflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  rabbitmq:
    image: rabbitmq:4-management-alpine
    <<: *restart
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-scribeflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-scribeflow}
    volumes:
      - ./.data/rabbitmq:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672" # management UI — tunnel-only, never public
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768m

  # ClickHouse was removed from v1 (D42) — analytics live in Postgres until
  # utterance volume demands otherwise; the deferred design is in D17/D18.

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    <<: *restart
    env_file: ../api/.env
    environment:
      # Overrides whatever DATABASE_URL is in api/.env: inside the compose
      # network the DB is reachable by service name, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          # Ticket 3.6 (D64): bumped from 512m — transformers.js/ONNX for
          # query-time embedding is a resident small model, not just request
          # handling.
          memory: 1024m

  # Phase 2 pipeline workers (tickets 2.2-2.5): one shared image, one
  # entrypoint module per service — see docs/infrastructure.md for how each
  # one's share of the RAM budget was derived (the diarizer is the outlier
  # at 2 GB peak since it's the only one carrying pyannote/torch).
  slicer:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    command: ["uv", "run", "--no-sync", "python", "-m", "scribeflow_workers.slicer"]
    env_file: ../workers/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scribeflow}:${RABBITMQ_PASSWORD:-scribeflow}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  transcriber:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    env_file: ../workers/.env
    environment:
      # Service-network addresses override whatever localhost values are in
      # workers/.env (same pattern as the api service above).
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scribeflow}:${RABBITMQ_PASSWORD:-scribeflow}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m

  diarizer:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    command: ["uv", "run", "--no-sync", "python", "-m", "scribeflow_workers.diarizer"]
    env_file: ../workers/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scribeflow}:${RABBITMQ_PASSWORD:-scribeflow}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048m

  stitcher:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    command: ["uv", "run", "--no-sync", "python", "-m", "scribeflow_workers.stitcher"]
    env_file: ../workers/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scribeflow}:${RABBITMQ_PASSWORD:-scribeflow}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  # Phase 3 (3.1/3.2, D59): action items/decisions/summary + batched
  # sentiment — one Groq LLM call shape, no local model, so it's as light as
  # the stitcher (already budgeted into infrastructure.md's "slice/
  # transcribe/stitch/extract" 1.5 GB line).
  extractor:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    command: ["uv", "run", "--no-sync", "python", "-m", "scribeflow_workers.extractor"]
    env_file: ../workers/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scribeflow}:${RABBITMQ_PASSWORD:-scribeflow}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  # Ticket 3.5 (D63): embeds every transcript segment on finalize (runs in
  # parallel with extractor, triggered by the same stitcher finalize step —
  # invariant 5's "parallel, merge/finalize independently" shape). The
  # heaviest line in this file after the diarizer: sentence-transformers
  # pulls in a CPU torch build, same reasoning as the diarizer's `diarize`
  # extra — see docs/infrastructure.md's RAM budget table.
  embedder:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    command: ["uv", "run", "--no-sync", "python", "-m", "scribeflow_workers.embedder"]
    env_file: ../workers/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scribeflow}:${RABBITMQ_PASSWORD:-scribeflow}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m

  # Ticket 3.8 (D66): daily scan for open, overdue, assigned action items ->
  # optional Resend digest email per owner. Not message-driven like the
  # other workers (no queue binding) — just a lightweight sleep loop, so it
  # gets no RabbitMQ dependency and the smallest memory line in this file.
  nudger:
    build:
      context: ../workers
      dockerfile: Dockerfile
    <<: *restart
    command: ["uv", "run", "--no-sync", "python", "-m", "scribeflow_workers.nudger"]
    env_file: ../workers/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scribeflow}:${POSTGRES_PASSWORD:-scribeflow}@postgres:5432/${POSTGRES_DB:-scribeflow}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  # Public ingress (D39): Caddy terminates TLS with automatic Let's Encrypt
  # certs and proxies to the api container. VM-only — don't start this
  # locally (it binds 80/443 and would try to obtain real certificates).
  # Requires: A record scribeflow-api.deepcoomer.dev -> VM IP, and 80+443
  # open in BOTH the Oracle security list and ufw.
  caddy:
    image: caddy:2-alpine
    <<: *restart
    ports:
      - "80:80" # ACME HTTP-01 challenge + redirect to https
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.data/caddy:/data
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128m
